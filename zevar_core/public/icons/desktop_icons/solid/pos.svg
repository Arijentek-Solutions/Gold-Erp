<line x1="21" y1="36.5" x2="25" y2="36.5" stroke="#D4AF37" stroke-width="0.6" stroke-opacity="0.5"/>
<line x1="21" y1="38.5" x2="27" y2="38.5" stroke="#D4AF37" stroke-width="0.6" stroke-opacity="0.3"/>
</svg>
