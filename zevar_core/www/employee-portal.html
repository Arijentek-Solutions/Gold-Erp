<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Portal</title>
    <link rel="icon" href="/assets/zevar_core/images/employee_portal_logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <script>
        window.csrf_token = "{{ frappe.session.csrf_token }}";
        window.frappe_user = "{{ frappe.session.user }}";     
    </script>
    {% set employee_portal_js = get_frontend_asset('employee-portal', 'index.js') %}
    {% set employee_portal_css = get_frontend_asset('employee-portal', 'index.css') %}

    {% if employee_portal_js %}
    <script type="module" crossorigin src="{{ employee_portal_js }}"></script>
    {% endif %}
    {% if employee_portal_css %}
    <link rel="stylesheet" crossorigin href="{{ employee_portal_css }}">
    {% endif %}
</head>

<body class="bg-[#05070a]">
    <div id="app"></div>
    <div id="debug-log"
        style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap; z-index: 9999; position: relative;">
    </div>
    <script>
        window.addEventListener('error', function (e) {
            document.getElementById('debug-log').innerText += '\nError: ' + e.message + '\n' + e.error.stack;
        });
        window.addEventListener('unhandledrejection', function (e) {
            document.getElementById('debug-log').innerText += '\nPromise Rejection: ' + e.reason;
        });
    </script>
</body>

</html>
