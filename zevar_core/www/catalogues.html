<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zevar Catalogues</title>
    <link rel="icon" href="/assets/zevar_core/images/pos_logo.svg">
    <meta http-equiv="refresh" content="0;url=/pos/catalogues">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #0a0a0a;
            color: #D4AF37;
            font-family: 'Inter', sans-serif;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Redirecting to Catalogues...</p>
    </div>
    <script>
        // Fallback JavaScript redirect
        window.location.href = '/pos/catalogues';
    </script>
</body>

</html>
